<app-page-title titulo="Mi perfil"></app-page-title>

@if (loading()) {
  <p class="text-muted">Cargando perfil...</p>
} @else if (error()) {
  <p class="text-danger">No se pudo cargar el perfil. Intenta de nuevo.</p>
} @else {
  <div class="section-card">
    <form class="form-wrapper" (ngSubmit)="guardarPerfil()">
      <h5 class="section-subtitle">Datos personales</h5>

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" name="fullName" [(ngModel)]="formulario.fullName" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="formulario.email" required>
      </div>

      <h5 class="section-subtitle">Información laboral</h5>

      <div class="mb-3">
        <label class="form-label">Rol específico</label>
        <input type="text" class="form-control" value="Coordinador académico" readonly>
      </div>

      <div class="mb-4">
        <label class="form-label">Área de gestión</label>
        <input type="text" class="form-control" value="Gestión académica" readonly>
      </div>

      <h5 class="section-subtitle">Notificaciones</h5>

      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" id="alertaTareas" name="emailNotifications" [(ngModel)]="formulario.emailNotifications">
        <label class="form-check-label" for="alertaTareas">
          Recibir alertas sobre cumplimiento de tareas (Email)
        </label>
      </div>

      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="alertaSistema" name="appNotifications" [(ngModel)]="formulario.appNotifications">
        <label class="form-check-label" for="alertaSistema">
          Recibir alertas sobre fallas en el sistema (App)
        </label>
      </div>

      <button type="submit" class="btn-primary-custom" [disabled]="guardando()">
        {{ guardando() ? 'Guardando...' : 'Guardar perfil' }}
      </button>
    </form>
  </div>
}
