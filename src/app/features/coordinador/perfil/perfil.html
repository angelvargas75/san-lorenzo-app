<app-page-title titulo="Mi perfil"></app-page-title>

<div class="section-card">
  <form class="form-wrapper">
    <h5 class="section-subtitle">Datos personales</h5>

    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-control" value="Coordinador Académico">
    </div>

    <div class="mb-4">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" value="coordinador@santiagoapostol.edu.pe">
    </div>

    <h5 class="section-subtitle">Información laboral</h5>

    <div class="mb-3">
      <label class="form-label">Rol específico</label>
      <input type="text" class="form-control" value="Coordinador académico">
    </div>

    <div class="mb-4">
      <label class="form-label">Área de gestión</label>
      <input type="text" class="form-control" value="Gestión académica">
    </div>

    <h5 class="section-subtitle">Notificaciones</h5>

    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" id="alertaTareas" checked>
      <label class="form-check-label" for="alertaTareas">
        Recibir alertas sobre cumplimiento de tareas
      </label>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" id="alertaSistema">
      <label class="form-check-label" for="alertaSistema">
        Recibir alertas sobre fallas en el sistema
      </label>
    </div>

    <button type="button" class="btn-primary-custom">Guardar perfil</button>
  </form>
</div>
