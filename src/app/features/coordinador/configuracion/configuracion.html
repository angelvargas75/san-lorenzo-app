<app-page-title titulo="Configuración del sistema"></app-page-title>

<div class="section-card">
  <form class="form-wrapper">
    <h5 class="section-subtitle">Configuración general</h5>

    <div class="mb-3">
      <label class="form-label">Nombre del colegio</label>
      <input type="text" class="form-control" value="IEP Santiago Apóstol">
    </div>

    <div class="mb-3">
      <label class="form-label">Año académico actual</label>
      <input type="text" class="form-control" value="2026">
    </div>

    <div class="mb-4">
      <label class="form-label">Periodo académico actual</label>
      <select class="form-select">
        <option selected>Bimestre 2</option>
        <option>Bimestre 1</option>
        <option>Bimestre 3</option>
        <option>Bimestre 4</option>
      </select>
    </div>

    <h5 class="section-subtitle">Configuración de seguridad</h5>

    <div class="mb-3">
      <label class="form-label">Rol</label>
      <select class="form-select">
        <option selected>Coordinador académico</option>
        <option>Administrativo</option>
        <option>Docente</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label">Permisos</label>
      <input type="text" class="form-control" value="Gestión académica, reportes y comunicados">
    </div>

    <h5 class="section-subtitle">Parámetros de asistencia</h5>

    <div class="mb-3">
      <label class="form-label">Umbral de faltas injustificadas</label>
      <input type="number" class="form-control" value="3">
    </div>

    <div class="mb-4">
      <label class="form-label">Tolerancia de tardanza en minutos</label>
      <input type="number" class="form-control" value="10">
    </div>

    <button type="button" class="btn-primary-custom">Guardar cambios</button>
  </form>
</div>
