<app-page-title titulo="Horario"></app-page-title>

<div class="row">
  <!-- Columna izquierda: clases del día -->
  <div class="col-md-7">
    <h2 class="section-subtitle">{{ diaSeleccionado }}</h2>

    <div class="d-flex flex-column gap-4 mt-4">
      @for (clase of clases; track clase.nombre) {
        <div class="d-flex align-items-center">
          <div class="bg-light p-2 rounded me-3"><i class="bi fs-5" [ngClass]="clase.icono"></i></div>
          <div>
            <div class="fw-bold">{{ clase.nombre }}</div>
            <div class="small text-muted">{{ clase.horario }}</div>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Columna derecha: calendario interactivo -->
  <div class="col-md-5 mt-5 mt-md-0">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <i class="bi bi-chevron-left small text-muted" role="button"></i>
      <span class="fw-bold small">Abril 2024</span>
      <i class="bi bi-chevron-right small text-muted" role="button"></i>
    </div>
    <div class="table-responsive-mobile">
      <table class="table table-borderless text-center small">
        <thead>
          <tr class="text-muted fw-bold"><th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th></tr>
        </thead>
        <tbody>
          @for (semana of semanas; track $index) {
            <tr>
              @for (dia of semana; track $index) {
                <td>
                  @if (dia) {
                    <span
                      class="calendar-day"
                      [class.active]="dia === diaActivo"
                      role="button"
                      (click)="seleccionarDia(dia)"
                    >{{ dia }}</span>
                  }
                </td>
              }
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
